// ===== LIVEAAT CACHE =====
const liveatcCache = {};

async function getLiveAtcFeeds(icao) {
  if (liveatcCache[icao]) return liveatcCache[icao];
  try {
    const r = await fetch(`/api/liveatc/${icao}`);
    const d = await r.json();
    liveatcCache[icao] = d.feeds || [];
    return liveatcCache[icao];
  } catch(e) {
    return [];
  }
}

async function showAirportLiveAtc(ap) {
  const icao = (ap.wxId || ap.icao || '').toLowerCase();
  if (!icao) return;
  const feeds = await getLiveAtcFeeds(icao);
  S.selectedAirport = ap;
  let h = `<span class="close" onclick="hideTargetInfo()">✕</span><b>${ap.icao} ${ap.name}</b><br>`;
  if (feeds.length) {
    for (const f of feeds) {
      h += `<button class="atc-btn" data-stream="${f.streamId}" onclick="playAtc(this,'${f.streamId}')">▶ ${f.label}</button>`;
    }
  } else {
    h += `<span style="color:#007733;font-size:10px">No LiveATC feeds found</span>`;
  }
  infoEl.innerHTML = h + '<div id="atc-player" style="margin-top:2px"></div>';
  infoEl.classList.add('show');
}

function autoShowLiveAtc(){
  const q=S.currentAirport;
  if(!q) return;
  const ap=S.airports.find(a=>(a.wxId||a.icao)==q);
  if(ap){showAirportLiveAtc(ap);return}
  // Also check AIRPORTS dict for airports not in S.airports (e.g. local DB entries)
  const a=AIRPORTS[q];
  if(a) showAirportLiveAtc({icao:q,lat:a.lat,lon:a.lon,name:a.n,wxId:q.length===3&&/^[A-Z]/.test(q)?'K'+q:q});
}

// ===== AIRPORT DATA LOADER =====
function parseCsvLine(l){
  const r=[]; let f='', q=false;
  for(let i=0;i<l.length;i++){
    const c=l[i];
    if(q){if(c==='"'){if(l[i+1]==='"'){f+='"';i++}else q=false}else f+=c}
    else{if(c==='"')q=true;else if(c===','){r.push(f);f=''}else f+=c}
  }
  r.push(f); return r;
}
async function loadAirports(){
  try{
    const r=await fetch('https://davidmegginson.github.io/ourairports-data/airports.csv');
    const t=await r.text(), ap=[], lines=t.split('\n');
    for(let i=1;i<lines.length;i++){
      const m=parseCsvLine(lines[i]);
      if(m.length<14) continue;
      const type=m[2];
      if(type==='closed'||type==='heliport'||type==='seaplane_base') continue;
      if(m[8]!=='US') continue;
      const icao=(m[12]||m[1]||'').trim();
      const display=(m[1]||'').trim();
      if(!icao||icao.length<3) continue;
      const lat=parseFloat(m[4]), lon=parseFloat(m[5]), name=m[3];
      if(isNaN(lat)||isNaN(lon)) continue;
      const wxId=icao.length===3&&/^[A-Z]/.test(icao)?'K'+icao:icao;
      ap.push({icao:display,lat,lon,name,wxId,metar:'',taf:''});
    }
    const seen=new Set(ap.map(a=>a.icao));
    for(const k of Object.keys(AIRPORTS)){
      if(!seen.has(k)){
        const wxId=k.length===3&&/^[A-Z]/.test(k)?'K'+k:k;
        ap.push({icao:k,lat:AIRPORTS[k].lat,lon:AIRPORTS[k].lon,name:AIRPORTS[k].n,wxId,metar:'',taf:''});
      }
    }
    S.airports=ap;
    console.log('airports loaded',ap.length);
  }catch(e){console.error('airport load error',e)}
  if(!S.airports.length){
    for(const k of Object.keys(AIRPORTS)){
      const wxId=k.length===3&&/^[A-Z]/.test(k)?'K'+k:k;
      S.airports.push({icao:k,lat:AIRPORTS[k].lat,lon:AIRPORTS[k].lon,name:AIRPORTS[k].n,wxId,metar:'',taf:''});
    }
  }
  console.log('airports ready:',S.airports.length);
}
loadAirports();

// ===== METAR/TAF =====
async function fetchWx(ap){
  const wxId=ap.wxId||ap.icao;
  if(S.wxCache[wxId]&&Date.now()-S.wxCache[wxId].ts<300000) return S.wxCache[wxId];
  const cached=S.wxCache[wxId]||{metar:'',taf:''};
  cached.ts=Date.now();
  S.wxCache[wxId]=cached;
  return cached;
}

async function fetchScopeWx(){
  const aps=S.airports.filter(a=>{
    const d=distNm(S.centerLat,S.centerLng,a.lat,a.lon);
    return d<=S.maxRange && (a.wxId||a.icao||'').startsWith('K');
  });
  if(!aps.length) return;
  const ids=aps.map(a=>a.wxId||a.icao).join(',');
  const isLocal=location.port==='8080'||!location.port;
  const base=isLocal?'':'https://www.aviationweather.gov';
  const now=Date.now();
  try{
    const r=await fetch(base+`/api/data/metar?ids=${ids}&format=json&date=${new Date().toISOString().slice(0,10)}`,{cache:'no-store'});
    if(!r.ok) return;
    const data=await r.json();
    if(!Array.isArray(data)) return;
    for(const st of data){
      const id=st.icaoId||st.stationId;
      if(!id) continue;
      if(!S.wxCache[id]) S.wxCache[id]={metar:'',taf:'',lat:st.lat,lon:st.lon};
      S.wxCache[id].metar=st.rawOb||'';
      S.wxCache[id].lat=st.lat;
      S.wxCache[id].lon=st.lon;
      S.wxCache[id].ts=now;
    }
  }catch(e){console.error('metar ids error',e)}
  try{
    const r=await fetch(base+`/api/data/taf?ids=${ids}&format=json&date=${new Date().toISOString().slice(0,10)}`,{cache:'no-store'});
    if(!r.ok) return;
    const data=await r.json();
    if(!Array.isArray(data)) return;
    for(const st of data){
      const id=st.icaoId||st.stationId;
      if(!id) continue;
      if(!S.wxCache[id]) S.wxCache[id]={metar:'',taf:''};
      S.wxCache[id].taf=st.rawOb||'';
      S.wxCache[id].ts=now;
    }
  }catch(e){console.error('taf ids error',e)}
  S.lastMetarFetch=now;
}

// ===== STATE =====
const S = {
  sweepDeg:0, rpm:5, maxRange:25, mr:25, brightness:1, mapSource:'vfr', mapOpacity:0.1,
  proxNm:2, proxFt:700,
  airports:[], showAirports:true, wxCache:{}, hoveredAirport:null, selectedAirport:null, lastMetarFetch:0,
  dataMode:'live',
  aircraft:[], lastFrame:0,
  lastFetch:-10000, fetching:false,
  rateLimitBackoff:0,
  nextId:1, dpr:1,
  w:0, h:0, cx:0, cy:0, rad:0,
  centerLat:43.1399, centerLng:-89.3375,
  currentAirport:'KMSN',
  mapTiles:null, mapTilesLoading:false,
  bgDirty:true,
};

// ===== UTILITIES =====
function toRad(d){return d*Math.PI/180}
function toDeg(r){return r*180/Math.PI}
function normDeg(d){return((d%360)+360)%360}

function distNm(l1,n1,l2,n2){
  const R=3440.065, dL=toRad(l2-l1), dN=toRad(n2-n1);
  const a=Math.sin(dL/2)**2+Math.cos(toRad(l1))*Math.cos(toRad(l2))*Math.sin(dN/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function bearing(l1,n1,l2,n2){
  const dN=toRad(n2-n1);
  const y=Math.sin(dN)*Math.cos(toRad(l2));
  const x=Math.cos(toRad(l1))*Math.sin(toRad(l2))-Math.sin(toRad(l1))*Math.cos(toRad(l2))*Math.cos(dN);
  return normDeg(toDeg(Math.atan2(y,x)));
}

function toScreen(lat,lon){
  const d=distNm(S.centerLat,S.centerLng,lat,lon);
  const b=bearing(S.centerLat,S.centerLng,lat,lon);
  const r=(d/S.maxRange)*S.rad, br=toRad(b);
  return{x:S.cx+r*Math.sin(br),y:S.cy-r*Math.cos(br),dist:d,bearing:b};
}

// ===== MAP TILES =====
function tileZoom(){const r=S.maxRange;return r<=15?12:r<=30?11:r<=60?10:9}

function loadMapTiles(){
  const z=tileZoom(), n=1<<z;
  const rd=S.maxRange/60*1.25;
  const lr=rd/Math.cos(toRad(S.centerLat));
  const x0=Math.floor(n*(S.centerLng-lr+180)/360);
  const x1=Math.floor(n*(S.centerLng+lr+180)/360);
  const y0=Math.floor(n*(1-Math.log(Math.tan(toRad(S.centerLat+rd))+1/Math.cos(toRad(S.centerLat+rd)))/Math.PI)/2);
  const y1=Math.floor(n*(1-Math.log(Math.tan(toRad(S.centerLat-rd))+1/Math.cos(toRad(S.centerLat-rd)))/Math.PI)/2);
  const tiles=[];
  S.mapTilesLoading=true;
  tileStatus.textContent='loading '+(1+Math.abs(x1-x0))+'×'+(1+Math.abs(y1-y0))+' tiles…';
  for(let x=x0;x<=x1;x++) for(let y=y0;y<=y1;y++){
    const nx=((x%n)+n)%n, ny=n-1-y;
    const img=new Image();
    const t={x:nx,y,ny,z,img,ok:false};
    img.onload=()=>{t.ok=true};
    img.onerror=()=>{t.ok=false};
    const tileY=S.mapSource==='vfr'?ny:y;
    img.src=S.mapSource==='vfr'
      ?'https://vfrmap.com/20260319/tiles/vfrc/'+z+'/'+tileY+'/'+nx+'.jpg'
      :'https://tile.openstreetmap.org/'+z+'/'+nx+'/'+tileY+'.png';
    tiles.push(t);
  }
  S.mapTiles=tiles;
  S.bgDirty=true;
  if(tiles.length===0){S.mapTilesLoading=false;tileStatus.textContent='no tiles';return}
  const chk=setInterval(()=>{
    const all=tiles.every(t=>t.img.complete);
    if(!all) return;
    clearInterval(chk);
    S.mapTilesLoading=false;
    S.bgDirty=true;
    tileStatus.textContent='';
  },100);
}

function drawMapTiles(c){
  c=c||ctx;
  if(!S.mapTiles) return;
  const n=1<<tileZoom();
  let any=false;
  for(const t of S.mapTiles) if(t.img.complete&&t.ok){any=true;break}
  if(!any) return;
  const mo=S.mapOpacity, bright=0.12+mo*0.38, overlayA=0.88-mo*0.68;
  c.filter=S.mapSource==='vfr'
    ?`grayscale(1) brightness(${bright}) contrast(1.5)`
    :`grayscale(0.7) brightness(${bright}) contrast(1.2)`;
  for(const t of S.mapTiles){
    if(!t.img.complete||!t.ok) continue;
    const lon0=t.x/n*360-180, lon1=(t.x+1)/n*360-180;
    const lat1=toDeg(Math.atan(Math.sinh(Math.PI*(1-2*t.y/n))));
    const lat0=toDeg(Math.atan(Math.sinh(Math.PI*(1-2*(t.y+1)/n))));
    const nw=toScreen(lat1,lon0), se=toScreen(lat0,lon1);
    const dw=se.x-nw.x, dh=se.y-nw.y;
    if(dw>0&&dh>0) c.drawImage(t.img,nw.x,nw.y,dw,dh);
  }
  c.filter='none';
  c.fillStyle=`rgba(0,20,0,${overlayA})`;
  c.fillRect(0,0,S.w,S.h);
}

// ===== AIRPORT / GEO OVERLAY =====
function drawGeoOverlay(c){
  c=c||ctx;
  const{cx,cy,rad,mr}=S;
  const clt=S.centerLat;
  const cln=S.centerLng;
  const latStep=S.maxRange<=15?0.05:S.maxRange<=40?0.1:0.2;
  const lonStep=latStep/Math.cos(toRad(clt));
  const rDeg=mr/60;
  for(let lat=clt-rDeg;lat<=clt+rDeg;lat+=latStep){
    const p=toScreen(lat,cln);
    if(p.dist>mr*1.2) continue;
    c.strokeStyle='rgba(0,255,51,0.02)';
    c.lineWidth=0.2;
    c.beginPath();
    const dy=Math.abs(p.y-cy);
    const hw=dy<rad?Math.sqrt(rad*rad-dy*dy):0;
    c.moveTo(cx-hw,p.y);c.lineTo(cx+hw,p.y);
    c.stroke();
  }
  for(let lon=cln-rDeg/Math.cos(toRad(clt));lon<=cln+rDeg/Math.cos(toRad(clt));lon+=lonStep){
    const p=toScreen(clt,lon);
    if(p.dist>mr*1.2) continue;
    c.strokeStyle='rgba(0,255,51,0.02)';
    c.lineWidth=0.2;
    c.beginPath();
    const dx=Math.abs(p.x-cx);
    const hw=dx<rad?Math.sqrt(rad*rad-dx*dx):0;
    c.moveTo(p.x,cy-hw);c.lineTo(p.x,cy+hw);
    c.stroke();
  }

  // Nearby airports
  for(const[icao,apt]of Object.entries(AIRPORTS)){
    const p=toScreen(apt.lat,apt.lon);
    if(p.dist>mr||p.dist<0.3) continue;
    const isC=icao===S.currentAirport;
    c.strokeStyle=isC?'rgba(0,255,51,0.2)':'rgba(0,255,51,0.06)';
    c.lineWidth=isC?0.6:0.3;
    c.beginPath();
    c.arc(p.x,p.y,isC?3:1.5,0,Math.PI*2);
    c.stroke();
    if(isC||p.dist<mr*0.5){
      c.fillStyle=isC?'rgba(0,255,51,0.18)':'rgba(0,255,51,0.06)';
      c.font='7px Consolas,Courier New,monospace';
      c.textAlign='left';c.textBaseline='bottom';
      c.fillText(icao,p.x+3,p.y-1);
    }
  }
}

// ===== AIRCRAFT =====
function mkAircraft(cs,lat,lon,alt,hdg,spd,src){
  return{id:S.nextId++,callsign:cs,lat,lon,alt,hdg,spd,src,type:'',reg:'',lastLit:-DECAY_MS*2,history:[]};
}
function altStr(a){
  if(a>=18000) return'FL'+Math.round(a/1000)+'0';
  return String(Math.round(a/100)).padStart(3,'0');
}

// ===== LIVE DATA =====
let _fetchEpoch=0;

function processAircraft(list){
  if(!list||!list.length) return;
  const now=performance.now();
  for(const a of list){
    if(a.lat==null||a.lon==null) continue;
    if(typeof a.alt_baro==='string'||distNm(S.centerLat,S.centerLng,a.lat,a.lon)>S.maxRange*1.5) continue;
    const hex=a.hex||(a.flight||'????').trim();
    let ac=S.aircraft.find(x=>x.hex===hex);
    if(!ac){
      const al=typeof a.alt_baro==='number'?a.alt_baro:(a.alt_geom||35000);
      let cs=(a.flight||'').trim();
      if(!cs||/^[A-F0-9]{6}$/.test(cs)) cs=a.t||'---';
      ac=mkAircraft(cs,a.lat,a.lon,Math.round(al),Math.round(a.track||0),Math.round(a.gs||0),'live');
      ac.hex=hex; ac.lastSeen=now; ac.spotted=1;
      ac.type=a.t||''; ac.reg=a.r||'';
      S.aircraft.push(ac);
    }else{
      if(Math.abs(ac.lat-a.lat)>1e-6||Math.abs(ac.lon-a.lon)>1e-6){
        ac.history.push({lat:ac.lat,lon:ac.lon});
        if(ac.history.length>50) ac.history.shift();
      }
      ac.lat=a.lat; ac.lon=a.lon;
      ac.alt=Math.round(typeof a.alt_baro==='number'?a.alt_baro:(a.alt_geom||35000));
      ac.hdg=Math.round(a.track||0); ac.spd=Math.round(a.gs||0);
      ac.lastSeen=now; ac.spotted=(ac.spotted||0)+1;
      ac.type=a.t||ac.type; ac.reg=a.r||ac.reg;
      const ncs=(a.flight||'').trim();
      if(ncs&&!/^[A-F0-9]{6}$/.test(ncs)) ac.callsign=ncs;
    }
  }
}

async function fetchLiveData(){
  const epoch=++_fetchEpoch;
  const u=`/api/v3/lat/${S.centerLat}/lon/${S.centerLng}/dist/60?_=${Date.now()}`;
  const r=await fetch(u,{signal:AbortSignal.timeout(API_TIMEOUT),cache:'no-store'});
  if(!r||!r.ok) throw new Error('HTTP '+(r?r.status:'fail'));
  if(epoch!==_fetchEpoch) return;
  const raw=await r.text();
  const d=JSON.parse(raw);
  if(!d.ac||!d.ac.length) throw new Error('empty');
  if(epoch!==_fetchEpoch) return;
  processAircraft(d.ac);
  if(epoch!==_fetchEpoch) return;
  const now=performance.now();
  S.aircraft=S.aircraft.filter(ac=>ac.src!=='live'||(now-ac.lastSeen)<60000);
  // Auto-hide popup if selected target left scope
  if(S.selected&&!S.aircraft.includes(S.selected)) hideTargetPopup();
}

async function fetchData(){
  if(S.fetching) return;
  S.fetching=true;
  const backoff=S.rateLimitBackoff;
  if(backoff>0) await new Promise(r=>setTimeout(r,backoff));
  S.lastFetch=performance.now();
  try{
    await fetchLiveData();
    S.dataMode='live';
    S.rateLimitBackoff=0;
    if(!S.lastMetarFetch||Date.now()-S.lastMetarFetch>300000){fetchScopeWx()}
  }catch(e){
    const m=e.message;
    if(m.includes('429')||m.includes('403')||m.includes('Too Many')){
      S.rateLimitBackoff=Math.min((S.rateLimitBackoff||1000)*2,60000);
    }
  }
  S.fetching=false;
}

// ===== CENTER =====
function setCenter(q){
  q=(q||'').toUpperCase().trim();
  if(!q) return;
  let apt=AIRPORTS[q];
  if(!apt){
    const found=Object.entries(AIRPORTS).find(([,a])=>
      a.n.toUpperCase().includes(q)
    );
    if(found) apt=AIRPORTS[found[0]], q=found[0];
  }
  if(!apt){
    const found=S.airports.find(a=>
      a.icao!==q&&a.name&&a.name.toUpperCase().includes(q)
    );
    if(found) apt={lat:found.lat,lon:found.lon,n:found.name,st:''}, q=found.icao;
  }
  if(!apt) return;
  S.centerLat=apt.lat; S.centerLng=apt.lon;
  S.currentAirport=q;
  centerLabel.textContent=q+(apt.st?' · '+apt.n+', '+apt.st:' · '+apt.n);
  aptInput.value=q;
  S.bgDirty=true;
  S.fetching=false;S.aircraft=[];S.lastFetch=-10000;fetchData();
  loadMapTiles();
  autoShowLiveAtc();
}

aptGo.addEventListener('click',()=>setCenter(aptInput.value));
aptInput.addEventListener('keydown',e=>{if(e.key==='Enter')setCenter(aptInput.value)});
aptHome.addEventListener('click',()=>setCenter('KMSN'));

// ===== RENDER =====
function resize(){
  const r=canvas.parentElement.getBoundingClientRect();
  S.dpr=window.devicePixelRatio||1;
  const w=r.width,h=r.height;
  canvas.width=w*S.dpr; canvas.height=h*S.dpr;
  canvas.style.width=w+'px'; canvas.style.height=h+'px';
  S.w=w;S.h=h;S.cx=w/2;S.cy=h/2;S.rad=Math.min(w,h)/2-16;
  S.bgDirty=true;
}

function drawBg(){
  const{w,h,cx,cy,rad}=S;
  bgCanvas.width=canvas.width;
  bgCanvas.height=canvas.height;
  bgCtx.setTransform(S.dpr,0,0,S.dpr,0,0);
  bgCtx.fillStyle='#000800';
  bgCtx.fillRect(0,0,w,h);
  bgCtx.save();
  bgCtx.beginPath();
  bgCtx.arc(cx,cy,rad+2,0,Math.PI*2);
  bgCtx.clip();
  drawMapTiles(bgCtx);
  drawGeoOverlay(bgCtx);
  const{mr}=S;
  const r13=Math.round(mr/3), r23=Math.round(mr*2/3); const rings=[r13,r23,mr];
  for(const r of rings){
    const pr=(r/mr)*rad;
    bgCtx.beginPath();
    bgCtx.arc(cx,cy,pr,0,Math.PI*2);
    bgCtx.strokeStyle=r===rings[rings.length-1]?'rgba(0,255,51,0.45)':'rgba(0,255,51,0.3)';
    bgCtx.lineWidth=r===rings[rings.length-1]?1:0.8;
    bgCtx.stroke();
    const ul=-3*Math.PI/4;
    const tx=cx+(pr+10)*Math.cos(ul), ty=cy+(pr+10)*Math.sin(ul);
    bgCtx.save(); bgCtx.translate(tx,ty); bgCtx.rotate(ul+Math.PI/2);
    bgCtx.font='bold 11px Consolas,Courier New,monospace';
    bgCtx.fillStyle='rgba(0,255,51,0.7)';
    bgCtx.textAlign='center'; bgCtx.textBaseline='middle';
    bgCtx.fillText(r+'NM',0,0);
    bgCtx.restore();
  }
  for(let deg=0;deg<360;deg++){
    const a=toRad(deg)-Math.PI/2;
    const inner=deg%10===0?rad-14:deg%5===0?rad-8:rad-5;
    bgCtx.beginPath();
    bgCtx.moveTo(cx+rad*Math.cos(a),cy+rad*Math.sin(a));
    bgCtx.lineTo(cx+inner*Math.cos(a),cy+inner*Math.sin(a));
    bgCtx.strokeStyle=deg%90===0?'rgba(0,255,51,0.45)':deg%10===0?'rgba(0,255,51,0.3)':'rgba(0,255,51,0.1)';
    bgCtx.lineWidth=deg%90===0?1.2:deg%10===0?0.8:0.4;
    bgCtx.stroke();
  }
  bgCtx.textAlign='center';bgCtx.textBaseline='middle';
  bgCtx.font='bold 11px Consolas,Courier New,monospace';
  bgCtx.fillStyle='rgba(0,255,51,0.45)';
  for(let d=0;d<360;d+=30){
    const a=toRad(d)-Math.PI/2;
    bgCtx.fillText(String(d).padStart(3,'0'),cx+(rad-20)*Math.cos(a),cy+(rad-20)*Math.sin(a));
  }
  bgCtx.fillStyle='rgba(0,255,51,0.5)';
  bgCtx.font='bold 12px Consolas,Courier New,monospace';
  bgCtx.fillText('N',cx,cy-rad+4);
  bgCtx.restore();
}

function render(ts){
  const dt=S.lastFrame?(ts-S.lastFrame)/1000:1/60;
  S.lastFrame=ts;
  S.sweepDeg=normDeg(S.sweepDeg+S.rpm*360/60*dt);
  if(!S.fetching&&ts-S.lastFetch>API_INTERVAL) fetchData();

  const sr=toRad(S.sweepDeg), br=toRad(BEAM_DEG);
  for(const ac of S.aircraft){
    const b=toRad(bearing(S.centerLat,S.centerLng,ac.lat,ac.lon));
    let d=b-sr; if(d>Math.PI) d-=2*Math.PI; if(d<-Math.PI) d+=2*Math.PI;
    if(Math.abs(d)<br) ac.lastLit=ts;
  }

  const{w,h,cx,cy,rad,mr}=S;

  if(S.bgDirty){drawBg();S.bgDirty=false}

  ctx.setTransform(S.dpr,0,0,S.dpr,0,0);
  ctx.clearRect(0,0,w,h);
  ctx.drawImage(bgCanvas,0,0,w,h);
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx,cy,rad+2,0,Math.PI*2);
  ctx.clip();

  // Proximity detection — converging pairs within S.proxNm, ±S.proxFt
  const proxSet=new Set();
  const pn=S.proxNm, pf=S.proxFt;
  for(let i=0;i<S.aircraft.length;i++){
    for(let j=i+1;j<S.aircraft.length;j++){
      const a=S.aircraft[i], b=S.aircraft[j];
      const d=distNm(a.lat,a.lon,b.lat,b.lon);
      if(d>pn*2||Math.abs(a.alt-b.alt)>pf) continue;
      const n=Math.min(a.history.length,b.history.length,6);
      if(n<2){if(d<=pn){proxSet.add(a);proxSet.add(b)};continue}
      let sum=0, cnt=0;
      for(let k=0;k<=n;k++){
        const idx=n-k;
        const hd=k===0?d:distNm(a.history[idx].lat,a.history[idx].lon,b.history[idx].lat,b.history[idx].lon);
        sum+=hd; cnt++;
      }
      const avg=sum/cnt;
      if(d<avg*0.92&&d<pn){proxSet.add(a);proxSet.add(b)}
    }
  }

  // Trails — visible while data is fresh (60s), independent of sweep
  for(const ac of S.aircraft){
    const prox=proxSet.has(ac);
    const sel=ac===S.selected;
    const fresh=ts-ac.lastSeen<60000;
    if(!sel&&(!fresh||ac.history.length<2)) continue;
    const pos=toScreen(ac.lat,ac.lon);
    if(pos.dist>mr*1.05) continue;
    const al=sel?1:Math.max(0.45,1-(ts-ac.lastSeen)/60000);
    let px=pos.x, py=pos.y;
    ctx.save();
    if(sel) ctx.shadowColor='#66ff88';
    if(sel) ctx.shadowBlur=10;
    for(let i=ac.history.length-1;i>=0;i--){
      const hp=toScreen(ac.history[i].lat,ac.history[i].lon);
      if(hp.dist>mr) continue;
      const t=i===ac.history.length-1?al:(i/ac.history.length)*al;
      ctx.globalAlpha=Math.max(0.05,Math.max(0.15,t)*S.brightness);
      ctx.strokeStyle=prox?'#ff5555':sel?'#88ffaa':'#00ff33';
      ctx.lineWidth=sel?3:prox?2.5:2;
      ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(hp.x,hp.y);ctx.stroke();
      ctx.beginPath();ctx.arc(hp.x,hp.y,sel?2.5:1.5,0,Math.PI*2);ctx.fill();
      px=hp.x;py=hp.y;
    }
    ctx.restore();
  }

  // Sweep beam
  {
    const aL=toRad(S.sweepDeg)-Math.PI/2, aT=toRad(S.sweepDeg-BEAM_DEG)-Math.PI/2;
    ctx.save();
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,rad,aT,aL,false);ctx.closePath();
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,rad);
    g.addColorStop(0,'rgba(0,255,51,0.06)');
    g.addColorStop(0.5,'rgba(0,255,51,0.025)');
    g.addColorStop(1,'rgba(0,255,51,0)');
    ctx.fillStyle=g;ctx.fill();
    ctx.restore();
  }

  // Sweep line
  {
    const a=toRad(S.sweepDeg)-Math.PI/2;
    const ex=cx+rad*Math.cos(a),ey=cy+rad*Math.sin(a);
    ctx.save();
    ctx.shadowColor='#00ff33';ctx.shadowBlur=14;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(ex,ey);
    ctx.strokeStyle='rgba(120,255,120,0.4)';ctx.lineWidth=1.5;
    ctx.stroke();ctx.restore();
  }

  // Sweep endpoint
  {
    const a=toRad(S.sweepDeg)-Math.PI/2;
    ctx.save();
    ctx.shadowColor='#00ff33';ctx.shadowBlur=24;
    ctx.fillStyle='rgba(180,255,180,0.55)';
    ctx.beginPath();ctx.arc(cx+rad*Math.cos(a),cy+rad*Math.sin(a),2.5,0,Math.PI*2);
    ctx.fill();ctx.restore();
  }

  // Airports
  if(S.showAirports){
    for(const ap of S.airports){
      const p=toScreen(ap.lat,ap.lon);
      if(p.dist>S.maxRange) continue;
      ctx.save();
      ctx.strokeStyle='rgba(0,255,51,0.3)'; ctx.lineWidth=0.6;
      ctx.beginPath(); ctx.arc(p.x,p.y,4,0,Math.PI*2); ctx.stroke();
      ctx.fillStyle='rgba(0,255,51,0.35)'; ctx.beginPath(); ctx.arc(p.x,p.y,1.5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(0,255,51,0.25)';
      ctx.font='bold 8px Consolas,Courier New,monospace';
      ctx.textAlign='left'; ctx.textBaseline='bottom';
      ctx.fillText(ap.icao,p.x+5,p.y-2);
      ctx.restore();
    }
  }

  // Blips + labels with collision avoidance
  const labelQueue=[];
  for(const ac of S.aircraft){
    const prox=proxSet.has(ac);
    const sel=ac===S.selected;
    const age=sel?0:(ts-ac.lastLit)/DECAY_MS;
    if(!sel&&age>3.5) continue;
    const pos=toScreen(ac.lat,ac.lon);
    if(pos.dist>mr) continue;
    const al=sel?1:Math.max(0.45,1-age);
    const sz=sel?6:age<0.08?4.5:age<0.3?3.5:2.5;
    ctx.save();
    ctx.shadowColor=prox?'#ff3333':'#00ff33';
    ctx.shadowBlur=sel?24:prox?18:age<0.08?22:10;
    ctx.globalAlpha=(sel?1:Math.min(1,al*1.2))*S.brightness;
    ctx.fillStyle=prox?'#ff4444':sel?'#66ff88':'#00ff33';
    ctx.fillRect(pos.x-sz/2,pos.y-sz/2,sz,sz);
    ctx.restore();
    if(sel||(al>0.15&&S.brightness>0.1)) labelQueue.push({ac,pos,sel,al,prox});
  }
  if(labelQueue.length){
    ctx.font='bold 12px Consolas,Courier New,monospace';
    ctx.textAlign='left';ctx.textBaseline='top';
    labelQueue.sort((a,b)=>b.sel-a.sel);
    const placed=[];
    const candidates=[
      {dx:34,dy:-20},{dx:-34,dy:-20},{dx:34,dy:8},{dx:-34,dy:8},
      {dx:34,dy:-4},{dx:-34,dy:-4},{dx:0,dy:-32},{dx:0,dy:16},
    ];
    for(const ld of labelQueue){
      const{ac,pos,sel,al,prox}=ld;
      const cw=ctx.measureText(ac.callsign).width;
      const lw=Math.max(cw,ctx.measureText(altStr(ac.alt)).width,ctx.measureText(Math.round(ac.spd)+'KT').width)+6;
      const lh=43;
      let lx=pos.x+26, ly=pos.y-20;
      for(const c of candidates){
        const cx=Math.max(8,Math.min(w-lw-8,pos.x+c.dx));
        const cy=Math.max(8,Math.min(h-lh-8,pos.y+c.dy));
        let clash=false;
        for(const p of placed){
          if(cx<p.x+p.w&&cx+lw>p.x&&cy<p.y+p.h&&cy+lh>p.y){clash=true;break}
        }
        if(!clash){lx=cx;ly=cy;break}
      }
      placed.push({x:lx,y:ly,w:lw,h:lh});
      ctx.save();
      ctx.globalAlpha=(sel?1:Math.min(1,al*1.8))*S.brightness;
      ctx.strokeStyle=prox?'rgba(255,50,50,0.2)':'rgba(0,255,51,0.15)';ctx.lineWidth=0.5;
      ctx.setLineDash([2,3]);
      ctx.beginPath();ctx.moveTo(pos.x,pos.y);ctx.lineTo(lx+3,ly+lh/2);
      ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle=prox?'#ff6666':sel?'#ccffcc':'rgba(0,255,51,0.8)';
      ctx.fillText(ac.callsign,lx+3,ly);
      ctx.fillStyle=prox?'rgba(255,100,100,0.8)':sel?'rgba(150,255,150,0.8)':'rgba(0,255,51,0.55)';
      ctx.fillText(altStr(ac.alt),lx+3,ly+15);
      ctx.fillText(Math.round(ac.spd)+'KT',lx+3,ly+29);
      ctx.restore();
    }
  }

  // Center
  ctx.save();
  ctx.shadowColor='#00ff33';ctx.shadowBlur=8;
  ctx.strokeStyle='rgba(0,255,51,0.5)';ctx.lineWidth=0.7;
  ctx.beginPath();ctx.arc(cx,cy,4,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx-7,cy);ctx.lineTo(cx+7,cy);
  ctx.moveTo(cx,cy-7);ctx.lineTo(cx,cy+7);ctx.stroke();
  ctx.fillStyle='rgba(0,255,51,0.3)';
  ctx.font='9px Consolas,Courier New,monospace';
  ctx.textAlign='left';ctx.textBaseline='bottom';
  ctx.fillText(S.currentAirport,cx+9,cy-2);
  ctx.restore();
  ctx.restore();

  hudEl.innerHTML=`<span>${new Date().toISOString().slice(11,19)}Z</span>`;
}

// ===== CONTROLS =====
let zoomTimer;
zoomSlider.addEventListener('input',()=>{
  S.maxRange=S.mr=parseInt(zoomSlider.value);
  rangeVal.textContent=S.maxRange+' NM';
  S.bgDirty=true;
  clearTimeout(zoomTimer);
  zoomTimer=setTimeout(()=>{S.lastMetarFetch=0;loadMapTiles();S.lastFetch=-10000;fetchData()},250);
});

function setMapSource(src){
  S.mapSource=src;
  mapVfr.classList.toggle('on',src==='vfr');
  mapOsm.classList.toggle('on',src==='osm');
  loadMapTiles();
}
mapVfr.addEventListener('click',()=>setMapSource('vfr'));
mapOsm.addEventListener('click',()=>setMapSource('osm'));

brightnessSlider.addEventListener('input',()=>{
  S.brightness=parseInt(brightnessSlider.value)/100;
  brightnessVal.textContent=brightnessSlider.value+'%';
});

mapOpacitySlider.addEventListener('input',()=>{
  S.mapOpacity=parseInt(mapOpacitySlider.value)/100;
  mapOpacityVal.textContent=mapOpacitySlider.value+'%';
  S.bgDirty=true;
});

airportToggle.addEventListener('click',()=>{
  S.showAirports=!S.showAirports;
  airportToggle.classList.toggle('on',S.showAirports);
  if(!S.showAirports){S.hoveredAirport=null;wxPopup.classList.remove('show')}
});

let scanningLiveAtc = false;
document.getElementById('list-feeds-btn').addEventListener('click', async () => {
  const btn = document.getElementById('list-feeds-btn');
  if (scanningLiveAtc) return;
  scanningLiveAtc = true;
  btn.textContent = 'Scanning...';
  const infoEl = document.getElementById('target-info');
  const aps = S.airports.filter(a => {
    const p = toScreen(a.lat, a.lon);
    return p.dist <= S.maxRange;
  });
  let h = '<span class="close" onclick="hideTargetInfo()">✕</span><b>LiveATC Feeds in Range</b><br><br>';
  let found = 0;
  for (let i = 0; i < aps.length; i++) {
    const ap = aps[i];
    const icao = (ap.wxId || ap.icao || '').toLowerCase();
    if (!icao) continue;
    if (i > 0) await new Promise(r => setTimeout(r, 500));
    const feeds = await getLiveAtcFeeds(icao);
    if (feeds.length) {
      found++;
      h += `<b>${ap.icao}</b> ${ap.name}<br>`;
      for (const f of feeds) {
        h += `<button class="atc-btn" data-stream="${f.streamId}" onclick="playAtc(this,'${f.streamId}')">▶ ${f.label}</button>`;
      }
      h += '<br>';
    }
  }
  if (!found) h += '<span style="color:#007733">No LiveATC feeds found for airports in range</span>';
  infoEl.innerHTML = h + '<div id="atc-player" style="margin-top:2px"></div>';
  infoEl.classList.add('show');
  btn.textContent = 'LiveATC';
  scanningLiveAtc = false;
});

proxNmSlider.addEventListener('input',()=>{
  S.proxNm=parseFloat(proxNmSlider.value);
  proxNmVal.textContent=S.proxNm+' NM';
});
proxFtSlider.addEventListener('input',()=>{
  S.proxFt=parseInt(proxFtSlider.value);
  proxFtVal.textContent=S.proxFt+' FT';
});

// ===== TARGET LIST =====
function updList(){
  const s=[...S.aircraft].sort((a,b)=>a.callsign.localeCompare(b.callsign));
  if(!s.length){tgtList.innerHTML='<div class="empty">NO TARGETS</div>';tgtCount.textContent='0';return}
  const v=s.filter(a=>distNm(S.centerLat,S.centerLng,a.lat,a.lon)<=S.maxRange);
  tgtCount.textContent=v.length;
  if(!v.length){tgtList.innerHTML='<div class="empty">NO TARGETS IN RANGE</div>';return}
  let h='<table><thead><tr><th>C/S</th><th>NM</th><th>°</th><th>ALT</th><th>KT</th><th>HDG</th></tr></thead><tbody>';
  for(const a of v){const p=toScreen(a.lat,a.lon);const sel=a===S.selected;h+=`<tr class="${sel?'sel':''}" data-idx="${S.aircraft.indexOf(a)}"><td>${a.callsign}</td><td>${p.dist.toFixed(0)}</td><td>${Math.round(p.bearing)}</td><td>${altStr(a.alt)}</td><td>${Math.round(a.spd)}</td><td>${Math.round(a.hdg)}</td></tr>`}
  tgtList.innerHTML=h+'</tbody></table>';
  tgtList.querySelectorAll('tr[data-idx]').forEach(el=>{
    el.addEventListener('click',()=>{
      const idx=parseInt(el.dataset.idx);
      const ac=S.aircraft[idx];
      if(ac){S.selected=ac;const p=toScreen(ac.lat,ac.lon);const r=canvas.getBoundingClientRect();showTargetInfo(ac,r.left+p.x,r.top+p.y);updList()}
    });
  });
}

// ===== TARGET INFO =====
const infoEl=document.getElementById('target-info');

function showTargetInfo(ac, cx, cy){
  popupEl.innerHTML=
    `<span class="close" onclick="hideTargetPopup()">✕</span>`+
    `<b>${ac.callsign}</b><br>`+
    `<span class="l">Type:</span> <span class="v">${ac.type||'—'}</span><br>`+
    `<span class="l">Reg:</span> <span class="v">${ac.reg||'—'}</span><br>`+
    `<span class="l">Lat:</span> <span class="v">${ac.lat.toFixed(4)}</span><br>`+
    `<span class="l">Lon:</span> <span class="v">${ac.lon.toFixed(4)}</span><br>`+
    `<span class="l">Alt:</span> <span class="v">${altStr(ac.alt)}</span><br>`+
    `<span class="l">Spd:</span> <span class="v">${Math.round(ac.spd)} KT</span><br>`+
    `<span class="l">Hdg:</span> <span class="v">${Math.round(ac.hdg)}°</span><br>`+
    `<span class="l">Src:</span> <span class="v">${ac.src.toUpperCase()}</span><br>`;
  positionPopup(cx, cy);
  popupEl.classList.add('show');
}

function positionPopup(cx, cy){
  const wrap=document.getElementById('radar-wrap');
  const wr=wrap.getBoundingClientRect();
  let left=cx-wr.left+10, top=cy-wr.top+10;
  const pw=200, ph=220;
  if(left+pw>wr.width) left=wr.width-pw-10;
  if(left<10) left=10;
  if(top+ph>wr.height) top=wr.height-ph-10;
  if(top<10) top=10;
  popupEl.style.left=left+'px';
  popupEl.style.top=top+'px';
}

function hideTargetPopup(){
  popupEl.classList.remove('show');
  S.selected=null;
  updList();
}

function hideTargetInfo(){
  const p=document.getElementById('atc-player');
  if(p){const a=p.querySelector('audio');if(a)a.pause()}
  infoEl.classList.remove('show');
  S.selected=null; S.selectedAirport=null;
  updList();
}

function playAtc(btn,stream){
  const p=document.getElementById('atc-player');
  if(!p) return;
  const wasPlaying=btn.classList.contains('playing');
  p.innerHTML='';
  document.querySelectorAll('.atc-btn').forEach(b=>b.classList.remove('playing'));
  if(wasPlaying) return;
  btn.classList.add('playing');
  const a=document.createElement('audio');
  a.controls=true; a.autoplay=true;
  a.src='https://d.liveatc.net/'+stream;
  a.onerror=()=>{a.remove();btn.classList.remove('playing');p.innerHTML='<span style="color:#ff4444;font-size:10px">Stream unavailable</span>'};
  p.appendChild(a);
}

canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect();
  const px=(e.clientX-r.left)/r.width*S.w;
  const py=(e.clientY-r.top)/r.height*S.h;
  if(S.showAirports){
    for(const ap of S.airports){
      const p=toScreen(ap.lat,ap.lon);
      if(p.dist>S.maxRange) continue;
      const d=Math.hypot(p.x-px,p.y-py);
      if(d<12){
        showAirportLiveAtc(ap);
        return;
      }
    }
  }
  let best=null, bestD=16;
  for(const ac of S.aircraft){
    const p=toScreen(ac.lat,ac.lon);
    const d=Math.hypot(p.x-px,p.y-py);
    if(d<bestD){bestD=d;best=ac}
  }
  if(best){S.selected=best;S.selectedAirport=null;showTargetInfo(best,e.clientX,e.clientY);updList();return}
  hideTargetPopup();
});

canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  const px=(e.clientX-r.left)/r.width*S.w;
  const py=(e.clientY-r.top)/r.height*S.h;
  const aps=S.airports.filter(a=>S.showAirports);
  let best=null, bestD=12;
  for(const ap of aps){
    const p=toScreen(ap.lat,ap.lon);
    const d=Math.hypot(p.x-px,p.y-py);
    if(p.dist<=S.maxRange&&d<bestD){bestD=d;best=ap}
  }
  if(best&&best!==S.hoveredAirport){
    S.hoveredAirport=best;
    fetchWx(best).then(w=>{
      if(S.hoveredAirport!==best) return;
      let metar=w.metar, src='';
      if(!metar){
        let closest=null, cd=Infinity;
        for(const k in S.wxCache){
          if(!S.wxCache[k].metar||k===(best.wxId||best.icao)||!S.wxCache[k].lat) continue;
          const d=distNm(best.lat,best.lon,S.wxCache[k].lat,S.wxCache[k].lon);
          if(d<cd){cd=d;closest=k}
        }
        if(closest){
          metar=S.wxCache[closest].metar;
          const apt=S.airports.find(a=>a.wxId===closest||a.icao===closest);
          src=apt?apt.icao:closest;
        }
      }
      wxPopup.innerHTML=`<div class="h">${best.icao} ${best.name||''}</div>`+
        (metar?`<div class="m">${metar}</div>`+(src?`<div style="opacity:0.35;font-size:9px">via ${src}</div>`:''):'<div class="m" style="opacity:0.4">No METAR</div>')+
        (w.taf?`<div class="t">${w.taf}</div>`:'');
      wxPopup.style.left=(e.clientX+12)+'px';
      wxPopup.style.top=(e.clientY-10)+'px';
      wxPopup.classList.add('show');
    });
  }else if(!best){
    S.hoveredAirport=null;
    wxPopup.classList.remove('show');
  }
});

// ===== MAIN =====
let _frame=0;
function loop(t){render(t);if(++_frame%2===0)updList();requestAnimationFrame(loop)}
function init(){
  resize();
  window.addEventListener('resize',resize);
  new ResizeObserver(resize).observe(canvas.parentElement);
  fetchData();
  loadMapTiles();
  fetchScopeWx();
  centerLabel.textContent='KMSN · Dane County Regional, WI';
  setTimeout(autoShowLiveAtc, 500);
  loop(0);
}
init();
</script>
